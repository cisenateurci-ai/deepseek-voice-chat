<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Voice Chat - Cloud Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 30px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .badge {
            text-align: center;
            background: #e3f2fd;
            color: #1976d2;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 12px;
            margin-bottom: 20px;
            display: inline-block;
            margin-left: 50%;
            transform: translateX(-50%);
        }
        
        .chat-box {
            background: #f5f5f5;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-message {
            background: #667eea;
            color: white;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 80%;
            margin-left: auto;
            margin-right: 0;
            word-wrap: break-word;
        }
        
        .assistant-message {
            background: #e0e0e0;
            color: #333;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 80%;
            margin-left: 0;
            margin-right: auto;
            word-wrap: break-word;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        #startBtn {
            background: #28a745;
            color: white;
            flex: 1;
        }
        
        #startBtn:hover:not(:disabled) {
            background: #218838;
            transform: scale(1.05);
        }
        
        #stopBtn {
            background: #dc3545;
            color: white;
            flex: 1;
        }
        
        #stopBtn:hover:not(:disabled) {
            background: #c82333;
            transform: scale(1.05);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }
        
        .status.recording {
            color: #dc3545;
            font-weight: bold;
        }
        
        .info {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #856404;
            line-height: 1.6;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 DeepSeek Voice Chat</h1>
        <div class="badge">☁️ Cloud Edition</div>
        
        <div class="connection-status">
            <div class="status-dot"></div>
            <span id="connectionStatus">Connexion...</span>
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="assistant-message">Bienvenue ! Cliquez sur "Démarrer" pour commencer à parler. 🎙️</div>
        </div>
        
        <div class="controls">
            <button id="startBtn">🎤 Démarrer</button>
            <button id="stopBtn" disabled>⏹️ Arrêter</button>
        </div>
        
        <div class="status" id="status">En attente...</div>
        
        <div class="info">
            <strong>ℹ️ Mode Cloud:</strong><br>
            • Aucune installation requise<br>
            • Compatible avec tous les appareils<br>
            • Sauvegarde automatique des conversations
        </div>
    </div>
    
    <script>
        const chatBox = document.getElementById('chatBox');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const connectionStatus = document.getElementById('connectionStatus');
        
        let ws = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            const wsUrl = `${protocol}//${host}/ws`;
            
            try {
                ws = new WebSocket(wsUrl);
                ws.binaryType = 'arraybuffer';
                
                ws.onopen = () => {
                    connectionStatus.textContent = '✅ Connecté';
                    updateStatus('Connecté ✓');
                };
                
                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === 'response') {
                            addAssistantMessage(msg.content);
                        }
                    } catch (e) {
                        console.error('Erreur:', e);
                    }
                };
                
                ws.onerror = () => {
                    connectionStatus.textContent = '❌ Erreur';
                    updateStatus('Erreur de connexion');
                };
                
                ws.onclose = () => {
                    connectionStatus.textContent = '⏸️ Déconnecté';
                };
            } catch (error) {
                console.error('Erreur WebSocket:', error);
            }
        }
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                isRecording = true;
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    sendAudio();
                };
                
                mediaRecorder.start();
                startBtn.disabled = true;
                stopBtn.disabled = false;
                updateStatus('🔴 Enregistrement...');
            } catch (error) {
                updateStatus('❌ Erreur micro');
                alert('Veuillez autoriser l\'accès au micro');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                updateStatus('⏳ Traitement...');
            }
        }
        
        function sendAudio() {
            if (audioChunks.length === 0) return;
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const reader = new FileReader();
            
            reader.onload = () => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(reader.result);
                    addUserMessage('🎤 Enregistrement envoyé');
                }
            };
            
            reader.readAsArrayBuffer(audioBlob);
        }
        
        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user-message';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function addAssistantMessage(text) {
            const div = document.createElement('div');
            div.className = 'message assistant-message';
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function updateStatus(text) {
            status.textContent = text;
        }
        
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        
        window.addEventListener('load', initWebSocket);
    </script>
</body>
</html>
